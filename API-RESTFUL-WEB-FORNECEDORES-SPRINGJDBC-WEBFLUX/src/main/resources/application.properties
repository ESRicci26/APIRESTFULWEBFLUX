# =============================================
# CONFIGURAúíES - Spring WebFlux + SQLite
# =============================================
spring.application.name=API-RESTFUL-WEB-FORNECEDORES-SPRINGJDBC-WEBFLUX

# BANCO DE DADOS SQLITE
spring.datasource.url=jdbc:sqlite:fornecedores.DB
spring.datasource.driver-class-name=org.sqlite.JDBC

# Inicializar schema.sql automaticamente
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# NOTA: spring-boot-starter-webflux substitui spring-boot-starter-web.
# O Spring Boot detecta o WebFlux automaticamente e desabilita o Tomcat,
# usando o Netty como servidor HTTP reativo no lugar.

# Encoding UTF-8 para Thymeleaf e resposta HTTP
spring.thymeleaf.encoding=UTF-8
spring.mandatory-file-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Porta do servidor (Netty)
server.port=8080
